# Docker Compose: orchestrates the entire BestiZ system.
# Per assignment requirement: `docker compose up` runs the whole app.


services:

  # PostgreSQL database
  # The schema is auto-applied on first startup via the init script mount.
  postgres:
    image: postgres:16-alpine
    container_name: bestiz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Expose to host for local debugging tools (psql, DBeaver). Safe to remove in production.
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Files in /docker-entrypoint-initdb.d run automatically on first init only.
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  
  # Express + JavaScript backend
  
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: bestiz_server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      SERVER_PORT: ${SERVER_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CLIENT_URL: ${CLIENT_URL}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      # Mount source for hot reload in development.
      - ./server/src:/app/src
      # Anonymous volume for node_modules so the host folder doesn't shadow the container's.
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  
  # React + Vite frontend
  
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: bestiz_client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${CLIENT_PORT}:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.js:/app/vite.config.js
      - /app/node_modules
    depends_on:
      - server

volumes:
  postgres-data: